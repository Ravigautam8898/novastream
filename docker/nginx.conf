# NovaStream — Nginx Production Configuration
# Serves the client SPA (built by Vite) and proxies /api requests to the Node.js backend.

# ── Rate Limiting Zones (PPR-002) ──
# Applied before requests reach the Node.js API — defense-in-depth alongside
# the Express rate limiter. Nginx rejects excess requests at the proxy layer,
# preserving Node.js event loop capacity.
#
# Tuning:
#   General API: 100 req/s per IP (burst 150) — plenty for normal browsing
#   Auth:         5 req/min per IP — prevents brute force login attempts
#   Stream:      30 req/min per IP — limits aggressive segment prefetching

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;
    root /app/client/dist;
    index index.html;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security Headers (PPR-010) ──
    # CSP matches the Helmet config in app.js — applied at Nginx level so
    # the initial SPA HTML response is protected before any JS executes.
    # WARNING: Nginx location blocks that use add_header() OVERRIDE all
    # inherited add_header directives. Any location with its own add_header
    # must repeat ALL security headers below.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), display-capture=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://image.tmdb.org https://img.youtube.com https://img1.streamraiwind.stream data: blob:; media-src 'self' blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.themoviedb.org https://img.youtube.com https://*.streamraiwind.stream https://jolly-mouse-f41c.annierane.workers.dev; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'self'; object-src 'none'; worker-src 'self' blob:" always;

    # ── ACME Challenge (Let's Encrypt) ──
    # This location is excluded from the HTTP→HTTPS redirect below so
    # Let's Encrypt can verify domain ownership and renew certificates.
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    # ── HTTP→HTTPS Redirect (PPR-001) ──
    # Redirect all traffic to HTTPS, except ACME challenge for cert renewal.
    location / {
        return 301 https://$host$request_uri;
    }

    # ── API Auth (strict rate limit) ──
    # Login/register endpoints get the most aggressive rate limit.
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_conn conn_limit 20;
        proxy_pass http://127.0.0.1:5000/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API Stream (streaming rate limit) ──
    # Prevents aggressive segment prefetching and token scraping.
    location /api/stream/ {
        limit_req zone=stream_limit burst=60 nodelay;
        limit_conn conn_limit 30;
        proxy_pass http://127.0.0.1:5000/api/stream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ── General API Proxy ──
    # Search, content, progress, favorites, history, admin endpoints.
    location /api/ {
        limit_req zone=api_limit burst=150 nodelay;
        limit_conn conn_limit 50;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;

        # Large file support for HLS segments
        client_max_body_size 100M;
    }

    # ── HLS Streams (via API proxy with token auth) ──
    # All HLS content is served through the token-protected /api/stream/* endpoints.
    # Direct /hls/ access is NOT exposed in production.

    # ── HLS Segment Serving via X-Accel-Redirect (SC-016) ──
    # When STREAM_CDN_MODE is enabled, Node.js returns an X-Accel-Redirect header
    # and Nginx serves the HLS segment from disk. This location is `internal` so
    # it can only be accessed via X-Accel-Redirect, not directly by clients.
    # The path prefix matches stream.routes.js: path.relative(UPLOADS_BASE, filePath)
    location /uploads/ {
        internal;
        root /app;
        expires 1h;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET { deny all; }
    }

    # ── Static Assets (PPR-010: repeat security headers — location add_header overrides server block) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), display-capture=()" always;
        access_log off;
    }

    # ── SPA Fallback (PPR-010: repeat security headers — location add_header overrides server block) ──
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), display-capture=()" always;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny node_modules (shouldn't exist in production) ──
    location ~ /node_modules {
        deny all;
        access_log off;
        log_not_found off;
    }
}

